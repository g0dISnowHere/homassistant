- id: '1698942747694'
  alias: 'Warn that fridge has a high power consumption '
  description: 'Warn if the power used by the fridge is higher than a set amount for
    more than 5 minutes. '
  triggers:
  - entity_id:
    - sensor.emon_1_power
    for:
      hours: 0
      minutes: 5
      seconds: 0
    above: 80
    trigger: numeric_state
  conditions: []
  actions:
  - data:
      message: High fridge power consumption!
      title: ' ⚠️ Warning!'
    action: notify.notify
    enabled: true
  - repeat:
      count: 100
      sequence:
      - condition: numeric_state
        entity_id: sensor.emon_1_power
        above: 80
      - data:
          message: The fridge is open!
          title: Warning!
        action: notify.notify
      - delay:
          hours: 0
          minutes: 10
          seconds: 0
          milliseconds: 0
  mode: single

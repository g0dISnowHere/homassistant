- id: '1729754282857'
  alias: Warn that fridge has been on for a while
  description: Warn if the the fridge has been cooling for a longer time than usual
  triggers:
  - entity_id:
    - sensor.emon_1_power
    for:
      hours: 1
      minutes: 0
      seconds: 0
    above: 50
    trigger: numeric_state
  conditions: []
  actions:
  - data:
      message: Fridge turned on
      title: Info
    action: notify.notify
    enabled: false
  - repeat:
      count: 100
      sequence:
      - condition: numeric_state
        entity_id: sensor.emon_1_power
        above: 50
      - data:
          message: 'The fridge has been on for a while and might be open. '
          title: Warning!
        action: notify.notify
      - delay:
          hours: 0
          minutes: 10
          seconds: 0
          milliseconds: 0
  mode: single

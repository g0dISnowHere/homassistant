esphome:
  name: test
  friendly_name: test

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "ZJApxxFwoUCnSdn6CofSmig2txV/jjiLy+hY/XpuTY0="

ota:
  password: "4bfb916ea1b80790a78bea5a33166b77"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 10.20.30.123

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Test Fallback Hotspot"
    password: "CxPMyNorOfER"

captive_portal:

web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_server_password

binary_sensor:
  - platform: gpio
    pin: 35
    name: "PIR Sensor 1"
    device_class: motion
  - platform: gpio
    pin: 34
    name: "PIR Sensor 2"
    device_class: motion

# necessary for I²C sensors
i2c:
  sda: 21
  scl: 22
  scan: False
  id: bus_a

#https://esphome.io/components/sensor/bme280.html
sensor:
  - platform: bme280
    temperature:
      name: "BME280 Temperature"
      # oversampling: 16x
    pressure:
      name: "BME280 Pressure"
      # oversampling: 16x
    humidity:
      name: "BME280 Humidity"
      # oversampling: 16x
    address: 0x76
    update_interval: 60s
    i2c_id: bus_a


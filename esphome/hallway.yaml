esphome:
  name: hallway

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "xtYp3QaTRJn7H7vVmuaRQ4sp2bQcIZrZdOqc168L2F0="

ota:  
  - platform: esphome
    password: "149b5be90a4cc2a182858233b3d3fea7"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 10.20.30.125

# Optional manual IP
  # manual_ip:
  #   static_ip: 10.20.30.123
  #   gateway: 192.168.3.1
  #   subnet: 255.255.255.0
  
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Hallway Fallback Hotspot"
    password: "AXeCmQy1rfgI"

captive_portal:

web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_server_password

# https://devices.esphome.io/devices/Generic-PIR
binary_sensor:
  - platform: gpio
    pin: 18
    name: "PIR Sensor 1"
    device_class: motion
  - platform: gpio
    pin: 19
    name: "PIR Sensor 2"
    device_class: motion

# necessary for I²C sensors
i2c:
  sda: 21
  scl: 22
  scan: True
  id: bus_a

# https://esphome.io/components/esp32_ble_tracker/
esp32_ble_tracker:

# https://esphome.io/components/sensor/bme280.html
# https://esphome.io/components/sensor/#sensor-filters# Example configuration entry I2C
sensor:
  - platform: bme280_i2c
    temperature:
      name: "BME280 Temperature"
    pressure:
      name: "BME280 Pressure"
    humidity:
      name: "BME280 Humidity"


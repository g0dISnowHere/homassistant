  # - do something different with the leds

# device page: https://devices.esphome.io/devices/BlitzWolf-BW-SHP6

################################################################################
## device specific settings
################################################################################

# Enable Home Assistant API
api:
  encryption:
    key: "XD9N34inq3Bwk0ScJ+WoIMXJmFbzNjXOxsCW5hGjMiQ="

ota:
  - platform: esphome
    password: "171338d9269e8c298f7ac26c4560ccf7"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 10.20.30.124

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: ${device_name} " Fallback Hotspot"
    password: "ty6blvkIZxAh"

substitutions:
  device_name: "emon-2"
  # Higher value gives lower watt readout
  current_res: "0.00258"
  # Lower value gives lower voltage readout
  voltage_div: "737"
  # Max Power is 3450W for 15A and 2300W for 10A
  max_power: "3450"
  # 2020 model uses GPIO4 for CF1
  cf1_pin: GPIO4
  # BW-SHP6, outlet with powermonitoring.
  # One button for the relay, and one red led for the relay, as well as a blue status led
  # Static IP is configured, and fast_connect is enabled, as the SSID is hidden
  # Webserver is active and pw protected, and the OTA is password protected

################################################################################
## generic settings
################################################################################
# I want to be able to set and use the calibration values without recompiling the script for every change. 
# Calibration is an iterative process.
number:
  ## TODO still has to be connected to the correct variables
 - platform: template
   name: "current resolution"
   ## TODO Such a small increment is not displayed yet ...
   id: input_current_res
   web_server: 
    sorting_group_id: calibration_settings
   optimistic: true
  #  internal: true
   mode: slider
   unit_of_measurement: ohm
   min_value: 0.00
   max_value: 0.003
   step: 0.00001
   initial_value: 0.00258
   restore_value: True
   
 - platform: template
   name: "voltage divider"
   id: input_voltage_div  
   web_server: 
    sorting_group_id: calibration_settings
   optimistic: true
  #  internal: true
   mode: slider
   min_value: 0
   max_value: 1000
   step: 1 
   initial_value: 737
   restore_value: True

esphome:
  name: ${device_name}
  platform: ESP8266
  board: esp8285
  on_boot:
    then:
      - switch.turn_on: relay
      - output.turn_on: led

# Enable logging
logger:
  baud_rate: 0

captive_portal:

web_server:
  version: 3
  port: 80
  auth:
    username: admin
    password: !secret web_server_password
  sorting_groups:
    - id: calibration_settings
      name: "Calibration Settings (not yet working)"
      sorting_weight: 10

# Sets time from Homeassistant
time:
  - platform: homeassistant
    id: homeassistant_time

# Button configuration
binary_sensor:
  - platform: gpio
    name: "${device_name} button"
    id: button
    pin:
      number: GPIO13
      inverted: true
    on_press:
      then:
        - switch.toggle: relay

# Setup of LED's used in displaying Switch status
output:
  - platform: gpio
    pin: GPIO0
    inverted: true
    id: led

# Config for switch
switch:
  - platform: gpio
    pin: GPIO15
    restore_mode: RESTORE_DEFAULT_OFF
    id: relay
    name: "${device_name} Relay"
    on_turn_on:
      - output.turn_on: led
    on_turn_off:
      - output.turn_off: led

# Status LED for connection
status_led:
  pin:
    number: GPIO2
    inverted: true

# Sensors for Voltage (V), Current (A), Power (W), Daily energy usage (kWh)
sensor:
  # calibration procedure: https://frenck.dev/calibrating-an-esphome-flashed-power-plug/
  # check https://devices.esphome.io/devices/BlitzWolf-BW-SHP6
  - platform: hlw8012
    sel_pin:
      number: GPIO12
      inverted: true
    cf_pin: GPIO5
    cf1_pin: ${cf1_pin}
    current_resistor: ${current_res}
    voltage_divider: ${voltage_div}
    current:
      name: "${device_name} Current"
      unit_of_measurement: "A"
      accuracy_decimals: 3
      icon: mdi:flash-outline
      filters:
        - median:
            window_size: 11
            send_every: 5
            send_first_at: 5
    voltage:
      name: "${device_name} Voltage"
      unit_of_measurement: "V"
      icon: mdi:flash-outline
      filters:
        - median:
            window_size: 11
            send_every: 5
            send_first_at: 5
    power:
      name: "${device_name} Power"
      unit_of_measurement: "W"
      id: power
      icon: mdi:flash-outline
      filters:
        - median:
            window_size: 11
            send_every: 5
            send_first_at: 5
      on_value_range:
        - above: ${max_power}
          then:
            - output.turn_off: led
            - switch.turn_off: relay

# homeassistant notification example
            - homeassistant.service:
                service: persistent_notification.create
                data:
                  title: Message from ${device_name}
                data_template:
                  message: Switch turned off because power exceeded ${max_power}W
    energy:
      name: "${device_name} Energy"
      unit_of_measurement: "Wh"
      icon: mdi:flash-outline
    change_mode_every: 5
    update_interval: 1s

# wifi coverage and device tracking
  - platform: wifi_signal
    name: "${device_name} WiFi Signal"
    filters:
      - median:
          window_size: 11
          send_every: 5
          send_first_at: 5
    update_interval: 60s
    accuracy_decimals: 0
  - platform: uptime
    name: "${device_name} Uptime"
    unit_of_measurement: days
    update_interval: 300s
    accuracy_decimals: 1
    filters:
      - multiply: 0.000011574

# Sensors for ESP version and WIFI information
text_sensor:
  - platform: version
    name: "${device_name} ESPHome Version"
  - platform: wifi_info
    ip_address:
      name: "${device_name} ip"
    ssid:
      name: "${device_name} ssid"

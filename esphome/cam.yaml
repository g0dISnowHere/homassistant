substitutions:
  device_name: "cam1"
  power_level_up: "100%"
  power_level_down: "80%"
  right_time_up: "10s"
  right_time_down: "10s"
  left_time_up: "10s"
  left_time_down: "10s"
  
esphome:
  name: "${device_name}"
  friendly_name:  "${device_name}"

esp32:
  board: esp32dev
  framework:
    type: arduino

esp32_camera:
  name:  "${device_name}"
  external_clock:
    pin: GPIO0
    frequency: 20MHz
  i2c_pins:
    sda: GPIO26
    scl: GPIO27
  data_pins: [GPIO5, GPIO18, GPIO19, GPIO21, GPIO36, GPIO39, GPIO34, GPIO35]
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  power_down_pin: GPIO32
  reset_pin: GPIO15
  resolution: 640x480
  jpeg_quality: 10

#https://esphome.io/components/esp32_camera.html  
esp32_camera_web_server:
  - port: 8080
    mode: stream
  - port: 8081
    mode: snapshot
    
# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "YDXRkB0mYKdI3YczZDfQZe1f/nQhGRs68dvnaVNAslA="

ota:  
  - platform: esphome
    password: !secret password_ota
  
web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_server_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 10.20.30.122
  
#mqtt:
#  broker: 192.168.3.209
#  username: !secret username_mqtt
#  password: !secret password_mqtt

# Sets time from Homeassistant
time:
  - platform: homeassistant
    id: homeassistant_time

text_sensor:
  - platform: version
    name: " ${device_name} ESPHome Version"
  - platform: wifi_info
    ip_address:
      name: "${device_name} ip"
    ssid:
      name: "${device_name} ssid"


sensor:
# wifi coverage and device tracking
  - platform: wifi_signal
    name: "${device_name} WiFi Signal"
    update_interval: 60s
    accuracy_decimals: 0
  - platform: uptime
    name: "${device_name} Uptime"
    unit_of_measurement: days
    update_interval: 300s
    accuracy_decimals: 1
    filters:
      - multiply: 0.000011574


binary_sensor:
  - platform: status
    name: "Windows Status"
  - platform: gpio
    pin: 36 # check!
    name: "Right Window"
    device_class: window
  - platform: gpio
    pin: 39 # check!
    name: "Left Window"
    device_class: window

globals:
   - id: blinds_up
     type: int
     restore_value: no
     initial_value: '1'
   - id: blinds_down
     type: int
     restore_value: no
     initial_value: '0'

output:
  - platform: ledc
    pin: GPIO33
    id: AIA1  
    frequency: 490Hz    
  - platform: ledc
    pin: 32
    id: AIB1
    frequency: 490Hz
  - platform: ledc
    pin: 26
    id: BIA1
    frequency: 490Hz
  - platform: ledc
    pin: 25
    id: BIB1
    frequency: 490Hz

cover:
  - platform: time_based
    device_class: shade
    name: "right shade"
    open_action:
      - output.turn_on:
          id: AIB1
      - output.set_level:
          id: AIB1
          level: 100%
      #- switch.turn_on: AIA
    open_duration: 9s
    close_action:
      - output.turn_on:
          id: AIA1
      - output.set_level:
         id: AIA1
         level: 80%
      #- switch.turn_on: AIB
    close_duration: 7s
    stop_action:
      - output.turn_off:
          id: AIA1
      - output.turn_off:
          id: AIB1
      #- switch.turn_off: AIA
      #- switch.turn_off: AIB
  - platform: time_based
    device_class: shade
    name: "left shade"
    open_action:
      -  output.turn_on:
          id: BIB1
      - output.set_level:
          id: BIB1
          level: 100%
      #- switch.turn_on: BIA
    open_duration: 9s
    close_action:
      - output.turn_on: 
          id: BIA1
      - output.set_level:
          id: BIA1
          level: 80%
      #- switch.turn_on: BIB
    close_duration: 7s   
    stop_action:
      - output.turn_off:
          id: BIA1
      - output.turn_off:
          id: BIB1
      #- switch.turn_off: BIA
      #- switch.turn_off: BIB

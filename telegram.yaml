# https://www.home-assistant.io/integrations/telegram_bot/
# https://www.home-assistant.io/integrations/telegram/
# https://gist.github.com/balloob/d59cae89d19a14bcec99ce1bde05bd44

# Example configuration.yaml entry for the Telegram Bot
telegram_bot:
  - platform: polling
    api_key: !secret telegram_api_token
    allowed_chat_ids:
      - CHAT_ID_1 !secret tel_CHAT_ID_1 # example: 123456789 for the chat_id of a user
#      - CHAT_ID_2 # example: -987654321 for the chat_id of a group
#      - CHAT_ID_3

# Example configuration.yaml entry for the notifier
notify:
  - platform: telegram
    name: NOTIFIER_NAME
    chat_id: CHAT_ID_1

  # It is possible to add multiple notifiers by using another chat_id
  # the example belows shows an additional notifier which sends messages to the bot which is added to a group
#  - platform: telegram
#    name: NOTIFIER_NAME_OF_GROUP
#    chat_id: CHAT_ID_2
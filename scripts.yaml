wake_up_sequence:
  alias: wake up sequence
  sequence:
  - device_id: 51467b358dad8af0586cc55ba6597f2f
    domain: select
    entity_id: select.nightlight_preset
    type: select_option
    option: WakeupLight
  - device_id: 1d642ece31d1b5bab9809847bfd0eab9
    domain: select
    entity_id: select.adalight_preset
    type: select_option
    option: Evening
  - delay:
      hours: 0
      minutes: 20
      seconds: 0
      milliseconds: 0
  - device_id: 51467b358dad8af0586cc55ba6597f2f
    domain: select
    entity_id: select.nightlight_preset
    type: select_option
    option: MorningLight
  - device_id: 1d642ece31d1b5bab9809847bfd0eab9
    domain: select
    entity_id: select.adalight_preset
    type: select_option
    option: MorningLight
  - delay:
      hours: 0
      minutes: 5
      seconds: 0
      milliseconds: 0
  - alias: blink big ceiling light
    parallel:
    - repeat:
        sequence:
        - service: light.turn_on
          metadata: {}
          data:
            flash: short
          target:
            device_id: 2512feeda81049992778184af8ab0de4
        - delay:
            hours: 0
            minutes: 0
            seconds: 1
            milliseconds: 0
        - service: light.turn_off
          metadata: {}
          data: {}
          target:
            device_id: 2512feeda81049992778184af8ab0de4
        - delay:
            hours: 0
            minutes: 0
            seconds: 1
            milliseconds: 0
        until:
        - condition: state
          entity_id: input_boolean.lighttrigger
          state: 'on'
  mode: single
  icon: mdi:alarm-multiple

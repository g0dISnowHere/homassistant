    device_id: e02c713ed191cbc9d7379043234bda97
    entity_id: light.big_ceiling
    domain: light
    flash: short
  mode: single
start_night_mode:
  alias: Start night mode
  sequence: []
  mode: single
zigbee2mqtt_remove_2:
  alias: Zigbee2MQTT Remove
  sequence:
  - data_template:
      topic: zigbee2mqtt/bridge/request/device/remove
      payload_template: "{\n  \"id\": \"{{ states.input_text.zigbee2mqtt_remove.state
        | string }}\",\n  \"force\": {% if states.input_boolean.zigbee2mqtt_force_remove.state
        == \"off\" %}false{% else %}true{% endif %}\n}"
    action: mqtt.publish
  description: ''
zigbee2mqtt_rename_2:
  alias: Zigbee2MQTT Rename
  sequence:
  - data_template:
      topic: zigbee2mqtt/bridge/request/device/rename
      payload_template: "{\n  \"from\": \"{{ states.input_text.zigbee2mqtt_old_name.state
        | string }}\",\n  \"to\": \"{{ states.input_text.zigbee2mqtt_new_name.state
        | string }}\"\n}"
    action: mqtt.publish
  description: ''
